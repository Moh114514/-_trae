<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEIMS - 建筑能源智能管理系统</title>
  <link rel="icon" type="image/svg+xml" href="/vite.svg">
  <script type="module" crossorigin src="/assets/index-BBD6CpIy.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BfkGnIas.css">
</head>
<body>
  <div id="app"></div>
  
  <!-- AI Chat Widget 浮窗组件 -->
  <script>
    // 在加载浮窗前设置 API 基础 URL
    window.__BEIMS_API_BASE__ = (() => {
      const host = window.location.host;
      const hostname = window.location.hostname;
      const protocol = window.location.protocol;
      const isLocal = hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '::1';
      const isTunnel = host.includes('ngrok') || host.includes('trycloudflare.com');
      
      // 隧道访问时优先走同域（通常已做转发）
      if (isTunnel) {
        return protocol + '//' + host;  // 相同主机
      }

      // 本地开发地址（localhost 或 127.0.0.1）固定走后端 8001
      if (isLocal) {
        return 'http://localhost:8001';
      }
      
      // 其他部署场景默认同域
      return protocol + '//' + host;
    })();
    
    console.log('🔧 BEIMS API Base URL set to:', window.__BEIMS_API_BASE__);
  </script>
  <script src="/resources/scripts/ai-chat-widget.js"></script>
</body>
</html>
